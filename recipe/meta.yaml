{% set name = "coiled" %}
{% set version = "1.133.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/c0/b7/977966ac1827f9ccbd429e363b8d559aabff8bfa48a9c7ab0cafc2bcd971/coiled-{{ version }}.tar.gz
  sha256: 41bc7931f6ffd7cb04e22b5dd9476b4f42fd7d22841db508e96cf48cfa5b173d

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - coiled = coiled.cli.core:cli

requirements:
  host:
    - python {{ python_min }}
    - pip
    - wheel
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - aiohttp
    - backoff
    - boto3
    - click >=7.1
    - dask >=2022.02.0
    - distributed >=2022.02.0
    - fabric >=3.0
    - filelock
    - gilknocker >=0.4.1
    - httpx >=0.15
    - importlib-metadata
    - invoke >=2.0
    - ipywidgets
    - jmespath
    - jsondiff
    - paramiko >=2.4
    - pip-requirements-parser
    - pip >=19.3
    - prometheus_client
    - rich >=11.2.0
    - toml
    - setuptools >=49.3.0
    - typing-extensions
    - wheel

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - coiled login --help
    - coiled env --help
    - coiled --version
  imports:
    - coiled

about:
  home: https://coiled.io
  license: Elastic-2.0
  license_family: OTHER
  license_file: LICENSE
  summary: Deploy Dask cluster using Coiled Cloud

  description: |
    A Python package to easily create, manage, and connect to Dask deployments
    using Coiled Cloud.
  doc_url: https://coiled.io/cloud

extra:
  recipe-maintainers:
    - ntabris
    - dchudz
    - jrbourbeau
    - mrocklin
